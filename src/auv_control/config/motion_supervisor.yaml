# 运动管理层控制频率与反馈处理
control_rate_hz: 20.0         # 统一三轴速度闭环频率；目标可保持 5 Hz 发布
feedback_timeout: 0.5         # TF 或速度反馈最大允许间隔，单位 s，超时后进入 SAFE
velocity_filter_alpha: 0.50   # 速度一阶低通新数据权重，范围 (0,1]，越大响应越快
# 原始 /status/vel.r 到 map 航向角速度的符号；当前 MZ 与 r 方向相反，取 -1。
yaw_rate_to_map_sign: -1.0
pitch_offset_deg: 0.0         # 发送目标姿态时附加的固定俯仰角，单位 deg
startup_hover_frames: 5       # 首帧锁定位姿进入 HOVER 后保持的发布帧数，完成后才执行缓存任务目标

# 每个控制周期的完整 CSV 记录；目录中的 ~ 会展开为运行节点用户的主目录
log_enabled: true             # 是否记录当前/目标位姿、速度、状态、模式和力矩等完整数据
log_directory: ~/.ros/auv_logs/motion_supervisor # CSV 日志目录，每次启动自动新建带时间戳文件
log_flush_every: 20           # 每累计多少个控制周期刷新磁盘，20 Hz 下约每秒刷新

# 正常运动限幅；参数后缀表示本周期实际输出力或力矩的正负号
max_tx_positive: 700.0       # 正常运动阶段正 TX 最大值
max_tx_negative: 1000.0       # 正常运动阶段负 TX 绝对值上限
max_ty_positive: 1200.0       # 正常运动阶段正 TY 最大值
max_ty_negative: 2000.0       # 正常运动阶段负 TY 绝对值上限
max_mz_positive: 2000.0       # 正常转向阶段正 MZ 最大值
max_mz_negative: 3000.0       # 正常转向阶段负 MZ 绝对值上限
brake_max_tx_positive: 2000.0 # 主动刹车阶段正 TX 最大值
brake_max_tx_negative: 3000.0 # 主动刹车阶段负 TX 绝对值上限
brake_max_ty_positive: 2000.0 # 主动刹车阶段正 TY 最大值
brake_max_ty_negative: 4000.0 # 主动刹车阶段负 TY 绝对值上限
brake_max_mz_positive: 2000.0 # 主动刹转阶段正 MZ 最大值
brake_max_mz_negative: 3000.0 # 主动刹转阶段负 MZ 绝对值上限
force_slew_per_cycle: 1000.0 # 正常运动每控制周期允许的最大力矩变化量
brake_force_slew_per_cycle: 10000.0 # 刹车每控制周期允许的最大力矩变化量

# 统一三轴速度环增益；yaw 的正负按 map 航向角速度误差选择，对应最终 MZ 正负。
kv_x_positive: 6400.0       # 700 / 0.11；0.5 m 阶跃可触发正 TX 正常限幅
kv_x_negative: 9100.0       # 1000 / 0.11；0.5 m 阶跃可触发负 TX 正常限幅
kv_y_positive: 30000.0      # 1200 / 0.04；按右移 +1000 对应 0.04 m/s 的保守数据取值
kv_y_negative: 40000.0      # 2000 / 0.05；按左移 -2000 对应 0.05 m/s 取值
kp_yaw_positive: 7500.0     # 60 deg 阶跃静态控制核验证可触发正 MZ 正常限幅
kp_yaw_negative: 11200.0    # 60 deg 阶跃静态控制核验证可触发负 MZ 正常限幅

# 主动刹车增益；后缀表示最终刹车输出力或力矩的符号
brake_gain_tx_positive: 20000.0 # 输出正 TX 时的前向主动刹车增益，单位/(m/s)
brake_gain_tx_negative: 30000.0 # 输出负 TX 时的前向主动刹车增益，单位/(m/s)
brake_gain_ty_positive: 40000.0 # 输出正 TY 时的横向主动刹车增益，单位/(m/s)
brake_gain_ty_negative: 60000.0 # 输出负 TY 时的横向主动刹车增益，单位/(m/s)
brake_gain_mz_positive: -4000.0 # 输出正 MZ 时的主动刹转增益，符号适配当前 r 反馈
brake_gain_mz_negative: -6000.0 # 输出负 MZ 时的主动刹转增益，符号适配当前 r 反馈
brake_min_mz: 100.0          # 超过角速度停稳阈值时使用的最小有效 MZ 绝对值

# 各轴独立停车距离模型；后缀表示实际刹车输出力或力矩的符号
brake_acceleration_tx_positive: 0.08 # 输出正 TX 刹车时的保守有效减速度；对应 X 负向运动
brake_acceleration_tx_negative: 0.04 # 输出负 TX 刹车时的保守有效减速度；对应 X 正向运动
brake_acceleration_ty_positive: 0.06 # 输出正 TY 刹车时的保守有效减速度；对应 Y 负向运动
brake_acceleration_ty_negative: 0.04 # 输出负 TY 刹车时的保守有效减速度；对应 Y 正向运动
angular_brake_acceleration_mz_positive: 0.025 # 输出正 MZ 刹转时的保守有效角减速度；对应负向 yaw 运动
angular_brake_acceleration_mz_negative: 0.012 # 输出负 MZ 刹转时的保守有效角减速度；对应正向 yaw 运动
control_delay: 0.45          # 反馈、计算、通信和执行的综合延迟估计，单位 s
brake_margin_tx_positive: 0.18 # 输出正 TX 刹车时的附加停车余量，单位 m
brake_margin_tx_negative: 0.16 # 输出负 TX 刹车时的附加停车余量，单位 m
brake_margin_ty_positive: 0.20 # 输出正 TY 刹车时的附加停车余量，单位 m；对应 Y 负向运动
brake_margin_ty_negative: 0.18 # 输出负 TY 刹车时的附加停车余量，单位 m
yaw_brake_margin_positive_deg: 3.0 # 输出正 MZ 刹转时的附加角度余量，单位 deg
yaw_brake_margin_negative_deg: 3.0 # 输出负 MZ 刹转时的附加角度余量，单位 deg

# 捕获、接管和异常回退阈值
capture_radius: 0.04                # 允许进入 mode=4 接管等待的水平位置误差，单位 m
capture_exit_radius: 0.25           # mode=4 接管等待期间触发重新跟踪的水平位置误差，单位 m
control_center_hold_tolerance: 0.03 # 当前锁存控制中心的二维圆形位置死区，单位 m
horizontal_speed_threshold: 0.015   # 判定水平停稳的合速度上限，单位 m/s
yaw_tolerance_deg: 5.0              # 最终航向允许误差，单位 deg
yaw_rate_threshold_deg_s: 0.3       # 判定转动停稳的角速度上限，单位 deg/s
stable_frames: 5                    # 捕获或停稳条件需连续满足的控制帧数，20 Hz 下约为 0.25 s
hover_fault_position_error: 0.40    # mode=4 接管后才触发回退的水平位置误差，单位 m；必须大于 capture_exit_radius
hover_fault_speed: 0.15             # mode=4 接管后才触发回退的水平速度，单位 m/s
hover_fault_yaw_rate_deg_s: 5.0     # mode=4 接管后才触发回退的航向角速度，单位 deg/s
hover_fault_yaw_error_deg: 20.0     # mode=4 接管后才触发回退的航向误差，单位 deg
mode_ack_timeout: 1.0               # 接管确认及 HOVER 模式反馈最大允许间隔，单位 s


# 统一三轴位置-速度-力控制。
xy_max_speed: 0.30
xy_position_gain: 2.00
xy_max_acceleration: 0.40
xy_max_jerk: 0.40
# 预测停车距离内且合速度达到进入阈值时锁存刹停；低于退出阈值才恢复跟踪。
xy_brake_enter_speed: 0.020
xy_brake_exit_speed: 0.012
yaw_max_rate_deg_s: 25.0
yaw_position_gain: 1.50
yaw_max_acceleration_deg_s2: 20.0
yaw_max_jerk_deg_s3: 60.0
# 航向刹停迟滞；高于 0.6 deg/s 才进入，低于 0.2 deg/s 才退出。
yaw_brake_enter_rate_deg_s: 0.6
yaw_brake_exit_rate_deg_s: 0.2
# 速度反馈实测约 7 Hz；退出刹车前连续低速保持 0.40 s，防止低速采样抖动反复进出刹车。
brake_release_hold_seconds: 0.40
goal_static_capture_seconds: 0.80
# 目标仍然逐帧更新；仅超过以下阈值才重置速度/角速度参考和捕获计时。
goal_replan_position_threshold: 0.10 # 位置目标变化的重规划阈值，单位 m
goal_replan_yaw_threshold_deg: 5.0 # 目标航向变化的重规划阈值，单位 deg
control_dt_min: 0.02
control_dt_max: 0.20

# 推进器有效性矩阵 [ax, ay, yaw_rate] = B * [TX, TY, MZ]。
effectiveness_x_tx: 1.0
effectiveness_x_ty: 0.0
effectiveness_x_mz: 0.0
effectiveness_y_tx: -0.20
effectiveness_y_ty: 1.0
effectiveness_y_mz: 0.0
effectiveness_yaw_tx: 0.0
effectiveness_yaw_ty: 0.0
effectiveness_yaw_mz: 1.0
effectiveness_min_determinant: 0.05
