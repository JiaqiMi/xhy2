# 运动管理层控制频率与反馈处理
control_rate_hz: 5.0
feedback_timeout: 0.5
velocity_filter_alpha: 0.35
pitch_offset_deg: 0.0

# 下位机定深和定点使用的固定 NED 目标深度；launch 的 target_z 会覆盖此默认值
fixed_target_z: -0.6

# 首轮入水运动限幅；参考实测 1000 TX 约对应 0.1 m/s，协议范围为 [-10000, 10000]
max_tx: 1000.0
max_ty: 2000.0
max_mz: 1000.0
brake_max_tx_positive: 2000.0
brake_max_tx_negative: 3000.0
brake_max_ty_positive: 2000.0
brake_max_ty_negative: 4000.0
brake_max_mz_positive: 3000.0
brake_max_mz_negative: 3000.0
force_slew_per_cycle: 10000.0
brake_force_slew_per_cycle: 10000.0

# 无积分位置/航向控制增益；0.5 m 或约 10 deg 误差时接近首轮运动限幅
kp_x: 2000.0
kp_y: 4000.0
kv_x: 1000.0
kv_y: 2000.0
kp_yaw: 6000.0
kr_yaw: -2000.0
brake_gain_x: 30000.0
brake_gain_y: 40000.0
brake_gain_yaw: -6000.0

# 停车距离模型；参数后缀表示实际刹车力/力矩的符号
brake_acceleration_tx_positive: 0.05
brake_acceleration_tx_negative: 0.05
brake_acceleration_ty_positive: 0.025
brake_acceleration_ty_negative: 0.025
angular_brake_acceleration_mz_positive: 0.25
angular_brake_acceleration_mz_negative: 0.30
control_delay: 0.35
brake_margin: 0.15
yaw_brake_margin_deg: 3.0

# 捕获、接管和异常回退阈值
capture_radius: 0.25
capture_exit_radius: 0.35
horizontal_speed_threshold: 0.015
yaw_tolerance_deg: 5.0
path_yaw_tolerance_deg: 5.0
yaw_rate_threshold_deg_s: 0.3
stable_frames: 5
hover_fault_speed: 0.08
hover_fault_yaw_rate_deg_s: 6.0
mode_ack_timeout: 1.0
